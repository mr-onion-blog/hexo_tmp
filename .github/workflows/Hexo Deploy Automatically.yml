name: Hexo Deploy Automatically

on: 

# on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [14.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Generate
        run: |
          npm install hexo --save && npm install hexo-deployer-git --save  && npx hexo g
      
      - name: Deploy
        run: |
          git config --global user.name "SuperUseryjh" && git config --global user.email "13661546068@139.com" && npx hexo d
